- name: Prepare remote hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Make sure python3 is installed
      package:
        name: python3
        state: present
      become: true

    # Workaround for openssl ASN1 regression breaking HTTPS on EL9 (CVE-2026-34180); drop once AMIs ship a fix
    - name: Update openssl to avoid ASN1 TLS failures
      package:
        name: openssl
        state: latest
      become: true

- name: Prepare localhost
  hosts: localhost
  gather_facts: false
  vars:
  tasks:
    - name: Set localhost as known_urls
      ansible.builtin.blockinfile:
        marker: >-
          # {mark} KNOWN_URLS VAR
        block: |
          acs_play_known_urls:
            - http://localhost
        path: ../{{ lookup('env', 'MOLECULE_SCENARIO_NAME') }}/host_vars/{{ item }}.yml
      loop: "{{ groups.repository }}"
