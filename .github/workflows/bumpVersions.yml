---
name: Bump versions
run-name: Bump ${{ inputs.update-type || github.event_name }} using alfresco-updatecli/${{ inputs.alfresco-updatecli-ref || 'master' }}

on:
  schedule:
    - cron: '52 6 * * 1'
  push:
    branches-ignore:
      - 'master'
    paths:
      - .github/workflows/bumpVersions.yml
      - .github/updatecli/**
  workflow_dispatch:
    inputs:
      alfresco-updatecli-ref:
        description: "The version to use for alfresco/alfresco-updatecli configs"
        type: string
        default: master
      update-type:
          description: 'Which dependencies to bump'
          type: choice
          options:
          - maven
          - ami

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  DEFAULT_BRANCH_NAME: master
  UPDATECLI_BRANCH_NAME: updatecli-bump-versions

jobs:
  prepare-branch:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Reset ${{ env.UPDATECLI_BRANCH_NAME }} to ${{ env.DEFAULT_BRANCH_NAME }}
        run: |
          git checkout -b "${{ env.UPDATECLI_BRANCH_NAME }}"
          git push --force origin "${{ env.UPDATECLI_BRANCH_NAME }}"

  build:
    needs: prepare-branch
    runs-on: ubuntu-latest
    name: Bump versions
    if: |
      !cancelled()
      && needs.prepare-branch.result != 'failure'
      && github.actor != 'dependabot[bot]'
    steps:
      - name: Generate alfresco-engineering app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.GH_APP_ENGINEERING_CONTRIB_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_ENGINEERING_CONTRIB_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Generate alfresco-engineering app token for upstream reads
        id: app-token-upstream
        if: inputs.update-type == 'maven' || github.event_name == 'push'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.GH_APP_ENGINEERING_RO_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_ENGINEERING_RO_PRIVATE_KEY }}
          repositories: |
            acs-packaging
            alfresco-enterprise-repo
            alfresco-community-repo
          permission-contents: read

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Updatecli
        uses: Alfresco/alfresco-build-tools/.github/actions/setup-updatecli@v18.7.0
        with:
          version: 0.118.0

      - name: Checkout updatecli configs
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: alfresco/alfresco-updatecli
          ref: ${{ inputs.alfresco-updatecli-ref || 'master' }}
          path: alfresco-updatecli

      - name: Updatecli scm cache
        if: inputs.update-type == 'maven' || github.event_name == 'push'
        uses: actions/cache@v5
        with:
          path: /tmp/updatecli/github
          key: updatecli-v1-${{ hashFiles('.github/updatecli/updatecli_amps.tpl') }}
          restore-keys: |
            updatecli-v1-

      - name: Updatecli apply for Maven
        if: inputs.update-type == 'maven' || github.event_name == 'push'
        shell: bash
        run: |
          for version_file in .github/updatecli/updatecli_maven_*_values.yml; do
            echo ">>> Running updatecli_maven pipeline for version file: $version_file"
            updatecli pipeline apply --config .github/updatecli/updatecli_maven.tpl \
              -v alfresco-updatecli/deployments/values/supported-matrix.yaml \
              -v .github/updatecli/updatecli_maven_values.yml \
              -v $version_file
          done

          for version_file in .github/updatecli/updatecli_maven_v*_values.yml; do
            echo ">>> Running updatecli_amps pipeline for version file: $version_file"
            updatecli pipeline apply --config .github/updatecli/updatecli_amps.tpl \
              -v .github/updatecli/updatecli_amps_values.yml \
              -v $version_file
          done
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME_READ_ONLY }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD_READ_ONLY }}
          UPDATECLI_GITHUB_TOKEN: ${{ steps.app-token-upstream.outputs.token }}
          UPDATECLI_GITHUB_USERNAME: x-access-token

      - name: Updatecli apply for AMIs
        if: inputs.update-type == 'ami' || github.event_name == 'schedule'
        shell: bash
        run: |
          updatecli pipeline apply --config .github/updatecli/updatecli_amis.tpl \
            -v .github/updatecli/updatecli_amis_values.yml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
          UPDATECLI_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit changes
        uses: iarekylew00t/verified-bot-commit@5b4e8852dc472093935b8debcb81459bb79f7986 # v2.3.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref_name == env.DEFAULT_BRANCH_NAME && format('refs/heads/{0}', env.UPDATECLI_BRANCH_NAME) || github.ref }}
          files: |
            vars/acs*.yml
            roles/**/defaults/main.yml
          if-no-commit: info
          message: 🛠 Updatecli pipeline artifacts bump
