---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: activemq-instance
    image: $MOLECULE_ROLE_IMAGE
    dockerfile: ../../../../tests/molecule/Dockerfile-noprivs.j2
    command: "/lib/systemd/systemd"
    privileged: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volume_mounts:
      - "/sys/fs/cgroup:/sys/fs/cgroup:ro"
    groups:
      - repository
      - nginx
      - syncservice
      - database
      - transformers
      - sfs
      - trouter
      - search
      - adw
      - activemq
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../../roles:~/.ansible/roles"
  config_options:
    defaults:
      pipelining: True
  inventory:
    links:
      host_vars: host_vars
