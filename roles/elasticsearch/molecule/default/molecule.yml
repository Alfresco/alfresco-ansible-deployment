---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: elasticsearch-instance
    image: $MOLECULE_ROLE_IMAGE
    dockerfile: ../../../../tests/molecule/Dockerfile-noprivs.j2
    command: "/lib/systemd/systemd"
    privileged: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    groups:
      - elasticsearch
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../../roles:~/.ansible/roles"
  inventory:
    links:
      host_vars: host_vars
verifier:
  name: ansible
