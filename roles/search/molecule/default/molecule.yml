---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: search-instance
    image: $MOLECULE_ROLE_IMAGE
    dockerfile: ../../../../tests/molecule/Dockerfile-noprivs.j2
    command: "/lib/systemd/systemd"
    privileged: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    groups:
      - legacy_indexers
  - name: search-replica-instance
    image: $MOLECULE_ROLE_IMAGE
    dockerfile: ../../../../tests/molecule/Dockerfile-noprivs.j2
    command: "/lib/systemd/systemd"
    privileged: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    groups:
      - legacy_indexers
provisioner:
  name: ansible
  ansible_args:
    - -e
    - "@../../../../tests/molecule/secrets.yml"
  env:
    ANSIBLE_ROLES_PATH: "../../../../roles:~/.ansible/roles"
  inventory:
    links:
      host_vars: host_vars
